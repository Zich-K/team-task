<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: #1e2124; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
  .logo { width: 100px; height: 100px; border-radius: 22px; overflow: hidden; margin-bottom: 20px; background: #1e2124; }
  .logo img { width: 100%; height: 100%; object-fit: cover; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 36px; }
  .open-btn { background: #2d5a27; color: #fff; border: none; border-radius: 12px; padding: 16px 40px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; max-width: 360px; margin-bottom: 16px; }
  .url-box { background: #2a2d30; border: 1px solid #333; border-radius: 12px; padding: 12px 16px; margin-bottom: 36px; display: flex; align-items: center; gap: 10px; width: 100%; max-width: 360px; }
  .url-text { font-size: 11px; color: #aaa; flex: 1; word-break: break-all; }
  .copy-btn { background: #333; color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .steps { width: 100%; max-width: 360px; }
  .steps-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .os-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .os-tab { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #2a2d30; color: #888; font-size: 13px; cursor: pointer; text-align: center; }
  .os-tab.active { background: #2d5a27; border-color: #2d5a27; color: #fff; font-weight: 700; }
  .step-list { display: none; flex-direction: column; gap: 14px; }
  .step-list.active { display: flex; }
  .step { display: flex; gap: 12px; align-items: flex-start; }
  .step-num { width: 28px; height: 28px; border-radius: 50%; background: #2d5a27; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .step-text { font-size: 13px; color: #ccc; line-height: 1.6; padding-top: 4px; }
  .step-text strong { color: #fff; }
</style>

  <div class="steps">
    <div class="steps-title">홈화면에 설치하기</div>
    <div class="os-tabs">
      <div class="os-tab active" onclick="switchOS('android', this)">안드로이드</div>
      <div class="os-tab" onclick="switchOS('ios', this)">아이폰</div>
    </div>
    <div class="step-list active" id="android">
      <div class="step"><div class="step-num">1</div><div class="step-text">크롬에서 <strong>앱 열기</strong> 버튼 클릭</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-text">우측 상단 <strong>⋮</strong> 버튼 클릭</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-text"><strong>홈 화면에 추가</strong> 선택</div></div>
      <div class="step"><div class="step-num">4</div><div class="step-text"><strong>추가</strong> 클릭하면 설치 완료!</div></div>
    </div>
    <div class="step-list" id="ios">
      <div class="step"><div class="step-num">1</div><div class="step-text">사파리에서 <strong>앱 열기</strong> 버튼 클릭</div></div>
      <div class="step"><div class="step-num">2</div><div class="step-text">하단 <strong>공유 버튼 (□↑)</strong> 클릭</div></div>
      <div class="step"><div class="step-num">3</div><div class="step-text"><strong>홈 화면에 추가</strong> 선택</div></div>
      <div class="step"><div class="step-num">4</div><div class="step-text"><strong>추가</strong> 클릭하면 설치 완료!</div></div>
    </div>
  </div>

<script>
  function switchOS(os, el) {
    document.querySelectorAll('.os-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.step-list').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(os).classList.add('active');
  }
  function copyUrl() {
    navigator.clipboard.writeText('https://zich-k.github.io/team-task/').then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '복사됨!';
      setTimeout(() => btn.textContent = '복사', 2000);
    });
  }
</script>
</body>
</html>
